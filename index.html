<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Klašu Meklētājs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .result-item .class-name {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .result-item .text-preview {
            color: #666;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #1976d2;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            color: #666;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            width: auto;
            border-radius: 0;
            box-shadow: none;
            background: none;
        }

        .tab-btn:hover {
            color: #667eea;
            transform: none;
            box-shadow: none;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select:hover {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSS Klašu Meklētājs</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="url">URL</button>
            <button class="tab-btn" data-tab="html">HTML kods</button>
            <button class="tab-btn" data-tab="file">Faila augšupielāde</button>
        </div>

        <div class="tab-content" id="urlTab">
            <div class="input-group">
                <label for="url">URL adrese:</label>
                <input type="text" id="url" placeholder="https://example.com">
            </div>
            <div class="input-group">
                <label>
                    <input type="checkbox" id="useCorsProxy" checked>
                    Izmantot CORS proxy (nepieciešams lielākajai daļai lapu)
                </label>
            </div>
            <div class="input-group" id="proxyOptions">
                <label for="corsProxy">CORS Proxy serveris:</label>
                <select id="corsProxy">
                    <option value="corsproxy">Corsproxy.io (ātrākais)</option>
                    <option value="allorigins">AllOrigins (vidējs)</option>
                    <option value="codetabs">CodeTabs (lēnāks)</option>
                </select>
            </div>
        </div>

        <div class="tab-content" id="htmlTab" style="display: none;">
            <div class="input-group">
                <label for="htmlCode">Ielīmējiet HTML kodu:</label>
                <textarea id="htmlCode" rows="10" placeholder="Ielīmējiet šeit HTML kodu..."></textarea>
            </div>
        </div>

        <div class="tab-content" id="fileTab" style="display: none;">
            <div class="input-group">
                <label for="fileUpload">Izvēlieties HTML failu:</label>
                <input type="file" id="fileUpload" accept=".html,.htm">
            </div>
        </div>

        <div class="input-group">
            <label for="searchText">Meklējamais teksts:</label>
            <input type="text" id="searchText" placeholder="Ievadiet tekstu, ko meklēt">
        </div>

        <button id="searchBtn">Meklēt</button>

        <div id="loading" class="loading" style="display: none;">
            Notiek meklēšana...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="results" class="results">
            <h2>Rezultāti:</h2>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = {
            'url': document.getElementById('urlTab'),
            'html': document.getElementById('htmlTab'),
            'file': document.getElementById('fileTab')
        };

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;

                // Update active tab button
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Show corresponding tab content
                Object.keys(tabContents).forEach(key => {
                    tabContents[key].style.display = key === tabName ? 'block' : 'none';
                });
            });
        });

        document.getElementById('searchBtn').addEventListener('click', searchClasses);

        // Allow Enter key to submit
        document.getElementById('searchText').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchClasses();
            }
        });

        // Toggle proxy options visibility
        const useCorsProxyCheckbox = document.getElementById('useCorsProxy');
        const proxyOptions = document.getElementById('proxyOptions');

        useCorsProxyCheckbox.addEventListener('change', function() {
            proxyOptions.style.display = this.checked ? 'block' : 'none';
        });

        async function searchClasses() {
            const searchText = document.getElementById('searchText').value.trim();

            const errorDiv = document.getElementById('error');
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            const searchBtn = document.getElementById('searchBtn');

            // Reset
            errorDiv.style.display = 'none';
            resultsDiv.classList.remove('show');

            // Validation
            if (!searchText) {
                errorDiv.textContent = 'Lūdzu, ievadiet meklējamo tekstu!';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                loadingDiv.style.display = 'block';
                searchBtn.disabled = true;

                // Get HTML based on active tab
                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                let html;

                if (activeTab === 'url') {
                    html = await fetchFromURL();
                } else if (activeTab === 'html') {
                    html = document.getElementById('htmlCode').value.trim();
                    if (!html) {
                        throw new Error('Lūdzu, ielīmējiet HTML kodu!');
                    }
                } else if (activeTab === 'file') {
                    html = await readFromFile();
                }

                // Parse HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // Find all elements containing the search text
                const results = findTextInClasses(doc, searchText);

                displayResults(results, searchText);

            } catch (error) {
                errorDiv.textContent = `Kļūda: ${error.message}`;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        async function fetchFromURL() {
            const url = document.getElementById('url').value.trim();
            const useCorsProxy = document.getElementById('useCorsProxy').checked;
            const proxyType = document.getElementById('corsProxy').value;

            if (!url) {
                throw new Error('Lūdzu, ievadiet URL adresi!');
            }

            let fetchUrl = url;

            if (useCorsProxy) {
                const proxies = {
                    'corsproxy': `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    'allorigins': `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    'codetabs': `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
                };
                fetchUrl = proxies[proxyType];
            }

            const response = await fetch(fetchUrl);
            if (!response.ok) {
                throw new Error(`HTTP kļūda! Status: ${response.status}. Pamēģiniet citu proxy serveri.`);
            }

            return await response.text();
        }

        async function readFromFile() {
            const fileInput = document.getElementById('fileUpload');
            const file = fileInput.files[0];

            if (!file) {
                throw new Error('Lūdzu, izvēlieties HTML failu!');
            }

            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error('Neizdevās nolasīt failu!'));
                reader.readAsText(file);
            });
        }

        function findTextInClasses(doc, searchText) {
            const results = new Map(); // Use Map to store unique class combinations
            const searchLower = searchText.toLowerCase();

            // Get all text nodes
            const walker = document.createTreeWalker(
                doc.body,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );

            const textNodes = [];
            let node;
            while (node = walker.nextNode()) {
                if (node.nodeValue.trim() && node.nodeValue.toLowerCase().includes(searchLower)) {
                    textNodes.push(node);
                }
            }

            // For each text node, find the topmost parent with classes
            textNodes.forEach(textNode => {
                const topmostElement = findTopmostElementWithClass(textNode);

                if (topmostElement && topmostElement.className) {
                    const classes = typeof topmostElement.className === 'string'
                        ? topmostElement.className.trim()
                        : '';

                    if (classes) {
                        const text = textNode.nodeValue.trim();
                        const key = classes;

                        if (!results.has(key)) {
                            results.set(key, {
                                classes: classes,
                                texts: new Set()
                            });
                        }
                        results.get(key).texts.add(text);
                    }
                }
            });

            return Array.from(results.values());
        }

        function findTopmostElementWithClass(node) {
            let current = node.parentElement;
            let topmost = null;

            while (current && current !== document.body) {
                if (current.className && typeof current.className === 'string' && current.className.trim()) {
                    topmost = current;
                }
                current = current.parentElement;
            }

            return topmost;
        }

        function displayResults(results, searchText) {
            const resultsDiv = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');

            resultsList.innerHTML = '';

            if (results.length === 0) {
                resultsList.innerHTML = '<div class="no-results">Nav atrasts neviens rezultāts</div>';
            } else {
                results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'result-item';

                    const className = document.createElement('div');
                    className.className = 'class-name';
                    className.textContent = result.classes;

                    const textPreview = document.createElement('div');
                    textPreview.className = 'text-preview';
                    const texts = Array.from(result.texts).join(' | ');
                    textPreview.textContent = `Teksts: ${texts}`;

                    item.appendChild(className);
                    item.appendChild(textPreview);
                    resultsList.appendChild(item);
                });
            }

            resultsDiv.classList.add('show');
        }
    </script>
</body>
</html>
